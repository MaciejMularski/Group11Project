<!DOCTYPE html>
<html>
<head>
    <title>Rewards</title>

    <!-- same shared stylesheet as index/home -->
    <link rel="stylesheet" href="Styles.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>
<body>

    <!-- NAVBAR -->
    <div class="navbar">
        <div class="navInner">
            <div class="navLeft">
                <div class="navLogo"></div>
                <div class="navTitle">Employee Portal</div>
            </div>

            <div class="navLinks">
                <button class="linkBtn" onclick="window.location.href='home.html'">Home</button>
                <button class="linkBtn" onclick="window.location.href='rewards.html'">Rewards</button>
                <button class="linkBtn" onclick="logoutFromRewards()">Logout</button>
            </div>
        </div>
    </div>

    <!-- PAGE CONTENT -->
    <div class="shell">

        <!-- HEADER CARD -->
        <div class="card" style="margin-bottom:14px;">
            <h2 style="margin:0;">Rewards</h2>
            <div class="sub">Redeem your points for perks and rewards</div>

            <div style="margin-top:10px;">
                <span class="badge">⭐ Points: <span id="pointsValue">0</span></span>
            </div>
        </div>

        <!-- REWARDS LIST -->
        <div class="card" style="margin-bottom:14px;">
            <h3 style="margin:0 0 10px 0;">Available Rewards</h3>
            <div id="rewardsList"></div>
        </div>

        <!-- REDEMPTION HISTORY -->
        <div class="card">
            <h3 style="margin:0 0 10px 0;">My Redemption History</h3>
            <div id="redemptionsList"></div>
        </div>

    </div>

    <script>
        $(document).ready(function () {

            // Check session
            $.ajax({
                type: "POST",
                url: "ProjectServices.asmx/Me",
                data: "{}",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function (res) {
                    if (!res.d.loggedIn) {
                        window.location.href = "index.html";
                        return;
                    }

                    loadPoints();
                    loadRewards();
                    loadRedemptions();
                },
                error: function () {
                    window.location.href = "index.html";
                }
            });

        });

        function loadPoints() {
            $.ajax({
                type: "POST",
                url: "ProjectServices.asmx/GetPoints",
                data: "{}",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function (res) {
                    $("#pointsValue").text(res.d);
                }
            });
        }

        function loadRewards() {
            $.ajax({
                type: "POST",
                url: "ProjectServices.asmx/GetRewards",
                data: "{}",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function (res) {

                    let html = "";

                    (res.d || []).forEach(function (r) {

                        const imgUrl = (r.imageUrl && r.imageUrl.trim().length > 0)
                            ? r.imageUrl
                            : "https://via.placeholder.com/90?text=Reward";

                        const outOfStock = r.quantityAvailable <= 0;

                        html += `
                                <div class="reward-card">

                                    <img src="${escapeHtml(imgUrl)}"
                                         alt="${escapeHtml(r.name)}"
                                         onerror="this.onerror=null; this.src='https://via.placeholder.com/90?text=No+Image';" />

                                    <div class="reward-info">
                                        <h4>${escapeHtml(r.name)}</h4>
                                        <div class="sub">${escapeHtml(r.description || "")}</div>

                                        <div style="margin-top:8px;">
                                            <span class="badge">${r.pointsCost} points</span>
                                            <span class="sub" style="margin-left:10px;">Available: ${r.quantityAvailable}</span>
                                        </div>

                                        <div style="margin-top:10px;">
                                            <button class="btn btnPrimary" onclick="redeem(${r.rewardId})" ${outOfStock ? "disabled" : ""}>
                                                ${outOfStock ? "Out of stock" : "Redeem"}
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            `;
                    });

                    if (!html) {
                        html = `<div class="sub">No rewards available right now.</div>`;
                    }

                    $("#rewardsList").html(html);
                },
                error: function (xhr) {
                    console.log(xhr.responseText);
                    alert("Failed to load rewards.");
                }
            });
        }

        function loadRedemptions() {
            $.ajax({
                type: "POST",
                url: "ProjectServices.asmx/GetMyRedemptions",
                data: "{}",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function (res) {

                    const items = (res.d || []);
                    if (items.length === 0) {
                        $("#redemptionsList").html(`<div class="sub">No redemptions yet.</div>`);
                        return;
                    }

                    let html = `<div style="display:flex; flex-direction:column; gap:10px;">`;

                    items.forEach(function (r) {
                        html += `
                                <div style="border:1px solid var(--border); border-radius:12px; padding:12px; background:white;">
                                    <div style="font-weight:700;">${escapeHtml(r.rewardName)}</div>
                                    <div class="sub" style="margin-top:6px;">
                                        ${r.pointsSpent} pts • ${escapeHtml(r.status)} • ${new Date(r.createdAt).toLocaleString()}
                                    </div>
                                </div>
                            `;
                    });

                    html += `</div>`;

                    $("#redemptionsList").html(html);
                },
                error: function () {
                    $("#redemptionsList").html(`<div class="sub">Could not load redemption history.</div>`);
                }
            });
        }

        function redeem(rewardId) {
            $.ajax({
                type: "POST",
                url: "ProjectServices.asmx/RedeemReward",
                data: JSON.stringify({ rewardId: rewardId }),
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function (res) {

                    if (!res.d.success) {
                        alert(res.d.message);
                    } else {
                        alert(res.d.message);
                        $("#pointsValue").text(res.d.newPoints);
                    }

                    loadRewards();
                    loadRedemptions();
                },
                error: function () {
                    alert("Redeem failed. Please try again.");
                }
            });
        }

        function escapeHtml(str) {
            return String(str)
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // logout function to end session and return to login page
        function logoutFromRewards() {
            $.ajax({
                type: "POST",
                url: "ProjectServices.asmx/Logout",
                data: "{}",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function () { window.location.href = "index.html"; },
                error: function () { window.location.href = "index.html"; }
            });
        }
    </script>

</body>
</html>
