<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <title>Employee Login</title>

    <!--linking style file-->
    <link rel="stylesheet" href="Styles.css">
    
    <!-- jQuery (REQUIRED) -->
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.3.1/jquery.min.js"></script>

    <script type="text/javascript">

        // TEST DATABASE CONNECTION
        function TestButtonHandler() {
            $.ajax({
                type: "POST",
                url: "ProjectServices.asmx/TestConnection",
                data: "{}",
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function (msg) {
                    alert(msg.d);
                },
                error: function (xhr) {
                    console.log(xhr);
                    alert("Cannot reach webservice (" + xhr.status + "): " + xhr.responseText);
                }
            });
        }

        // LOGIN FUNCTION
        function login() {
            $("#errorMessage").text("");

            var parameters = JSON.stringify({
                email: $("#email").val(),
                password: $("#password").val()
            });

            $.ajax({
                type: "POST",
                url: "ProjectServices.asmx/Login",
                data: parameters,
                contentType: "application/json; charset=utf-8",
                dataType: "json",

                success: function (msg) {
                    var result = msg.d;

                    if (result.success) {
                        window.location.href = "home.html";
                    } else {
                        $("#errorMessage").text(result.message);
                    }
                },

                error: function (xhr) {
                    console.log(xhr);
                    $("#errorMessage").text(
                        "Server error (" + xhr.status + "): " + xhr.responseText
                    );
                }
            });
        }

    </script>
</head>

<body>
    <div class="page">
        <div class="card">

            <div class="topTools">
                <button class="btn btnGhost" onclick="TestButtonHandler()">Test connection</button>
            </div>

            <div class="brand">
                <div class="logo"></div>
                <div>
                    <h1>Employee Portal</h1>
                    <div class="sub">Sign in to view your points and rewards</div>
                </div>
            </div>

            <div class="formRow">
                <label for="email">Email</label>
                <input id="email" type="text" placeholder="name@company.com" />
            </div>

            <div class="formRow">
                <label for="password">Password</label>
                <input id="password" type="password" placeholder="••••••••" />
            </div>

            <div class="actions">
                <button class="btn btnPrimary" onclick="login()">Sign in</button>
            </div>

            <div id="errorMessage" class="error"></div>

            <div class="smallNote">
                If you have trouble logging in, contact your administrator.
            </div>

        </div>
    </div>
</body>
</html>
